<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nest & Paws</title>
  <meta name="description" content="Amazon find from Nest & Paws">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5EDD6; --sand: #C8B89A; --terra: #C17A4A;
      --wood: #8B6F4E; --charcoal: #2C2420; --white: #FDFAF5;
    }
    body { background: var(--cream); color: var(--charcoal); font-family: 'DM Sans', sans-serif; }

    nav {
      background: var(--charcoal);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--white);
      text-decoration: none;
    }
    .nav-back {
      font-size: 13px;
      color: var(--sand);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-back:hover { color: var(--white); }

    .product-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .product-layout { grid-template-columns: 1fr; gap: 28px; }
    }

    .product-img {
      border-radius: 20px;
      overflow: hidden;
      background: var(--white);
      aspect-ratio: auto;
      max-height: 80vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--cream), var(--sand));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .product-info { padding-top: 8px; }
    .product-bracket {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 12px;
    }
    .product-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 16px;
    }
    .product-subtitle {
      font-size: 15px;
      color: var(--wood);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 24px;
      padding-left: 14px;
      border-left: 3px solid var(--terra);
    }
    .product-story {
      font-size: 15px;
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 32px;
      color: var(--charcoal);
    }

    .cta-btn {
      display: block;
      width: 100%;
      background: var(--terra);
      color: var(--white);
      text-align: center;
      padding: 16px 24px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 12px;
    }
    .cta-btn:hover { background: var(--wood); transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }

    .disclosure {
      font-size: 12px;
      color: var(--sand);
      text-align: center;
      font-weight: 300;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: var(--wood);
      text-decoration: none;
    }
    .back-link:hover { color: var(--terra); }

    #not-found {
      text-align: center;
      padding: 80px 24px;
      display: none;
    }
    #not-found h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 16px;
    }
    #not-found a {
      color: var(--terra);
      text-decoration: none;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Nest & Paws</a>
  <a href="javascript:history.back()" class="nav-back">← Back</a>
</nav>

<div class="product-wrap">
  <div id="product-content">
    <div class="product-layout">
      <div class="product-img" id="product-img">
        <div class="img-placeholder">🛍️</div>
      </div>
      <div class="product-info">
        <div class="product-bracket" id="product-bracket"></div>
        <h1 class="product-title" id="product-title">Loading...</h1>
        <p class="product-subtitle" id="product-subtitle"></p>
        <p class="product-story" id="product-story"></p>
        <a href="#" class="cta-btn" id="product-cta">Shop on Amazon →</a>
        <p class="disclosure">Affiliate link — I earn a small commission at no extra cost to you</p>
      </div>
    </div>
    <a href="index.html" class="back-link">← Browse all finds</a>
  </div>

  <div id="not-found">
    <h2>Find not found</h2>
    <p><a href="index.html">Browse all finds →</a></p>
  </div>
</div>

<script src="products.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const product = PRODUCTS.find(p => p.id === id);

  if (product) {
    document.title = `${product.title} — Nest & Paws`;
    document.querySelector('meta[name="description"]').content = product.subtitle;
    document.getElementById('product-bracket').textContent = product.price_bracket;
    document.getElementById('product-title').textContent = product.title;
    document.getElementById('product-subtitle').textContent = product.subtitle;
    document.getElementById('product-story').textContent = product.story;
    document.getElementById('product-cta').href = product.affiliate_link;
    if (product.image) {
      document.getElementById('product-img').innerHTML =
        `<img src="${product.image}" alt="${product.title}" onerror="this.outerHTML='<div class=img-placeholder>🛍️</div>'">`;
    }
  } else {
    document.getElementById('product-content').style.display = 'none';
    document.getElementById('not-found').style.display = 'block';
  }
</script>
</body>
</html>
